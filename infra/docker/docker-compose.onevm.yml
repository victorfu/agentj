name: agentj-onevm

x-app-runtime: &app-runtime
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile.app
  image: agentj-app:${IMAGE_TAG:-local}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentj
      POSTGRES_USER: agentj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentj -d agentj"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    <<: *app-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agentj:${POSTGRES_PASSWORD}@postgres:5432/agentj
      AGENTJ_TUNNEL_BASE_DOMAIN: ${TUNNEL_BASE_DOMAIN}
      AGENTJ_TUNNEL_PUBLIC_SCHEME: https
      AGENTJ_TUNNEL_PUBLIC_PORT: "443"
      AGENTJ_CONNECT_TOKEN_SECRET: ${AGENTJ_CONNECT_TOKEN_SECRET}
      AGENTJ_GATEWAY_WS_PUBLIC_URL: wss://${GATEWAY_DOMAIN}/agent/v1/connect
    command: sh -lc "pnpm --filter @agentj/web start --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped

  gateway:
    <<: *app-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agentj:${POSTGRES_PASSWORD}@postgres:5432/agentj
      AGENTJ_TUNNEL_BASE_DOMAIN: ${TUNNEL_BASE_DOMAIN}
      AGENTJ_CONNECT_TOKEN_SECRET: ${AGENTJ_CONNECT_TOKEN_SECRET}
      PORT: "4000"
    command: sh -lc "pnpm --filter @agentj/tunnel-gateway start"
    restart: unless-stopped

  migrate:
    <<: *app-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agentj:${POSTGRES_PASSWORD}@postgres:5432/agentj
    command: sh -lc "node --import tsx packages/contracts/scripts/migrate.ts"
    restart: "no"

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      - web
      - gateway
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN}
      TUNNEL_BASE_DOMAIN: ${TUNNEL_BASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
