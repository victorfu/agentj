services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentj"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-bootstrap:
    image: node:24-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && pnpm install --frozen-lockfile &&
      pnpm --filter @agentj/contracts db:migrate &&
      pnpm --filter @agentj/contracts db:seed"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentj
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - pnpm_store:/root/.local/share/pnpm/store

volumes:
  postgres_data:
  pnpm_store:
